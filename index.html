<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 100선 | 서류는 AI에게, 복지는 사람에게</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a1aff;--blue-deep:#0d0d99;--blue-light:#eeeeff;--blue-mid:#6666ff;
  --pink:#E91E8C;--pink-light:#fce4f8;
  --navy:#0d1b4b;--white:#fff;--bg:#f8f9ff;
  --text:#1a1a2e;--text-muted:#555577;--border:#e0e0f0;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 헤더 ── */
.site-header{background:var(--navy);padding:2rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,#1a1aff22 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,#E91E8C18 0%,transparent 55%)}
.header-badge{display:inline-block;background:var(--pink);color:#fff;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.08em;margin-bottom:1rem;position:relative}
.header-title{font-size:clamp(22px,5vw,32px);font-weight:700;color:#fff;line-height:1.3;position:relative;margin-bottom:.5rem}
.header-title span{color:#6666ff}
.header-sub{font-size:14px;color:#aab;position:relative;margin-bottom:1.25rem}
.header-meta{display:flex;justify-content:center;gap:1.5rem;position:relative}
.header-meta span{font-size:12px;color:#8899cc;display:flex;align-items:center;gap:5px}
.header-meta span::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue-mid)}

/* ── 검색 ── */
.search-wrap{padding:1.25rem 1.5rem;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,50,.06)}
.search-inner{max-width:800px;margin:0 auto;display:flex;gap:10px;align-items:center}
.search-box{flex:1;height:40px;border:1.5px solid var(--border);border-radius:8px;padding:0 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border .15s}
.search-box:focus{border-color:var(--blue)}
.count-badge{font-size:12px;color:var(--text-muted);white-space:nowrap}

/* ── 필터 탭 ── */
.filter-wrap{max-width:800px;margin:0 auto;padding:1rem 1.5rem .25rem;overflow-x:auto}
.filter-row{display:flex;gap:6px;flex-wrap:nowrap;padding-bottom:.5rem}
.f-btn{flex-shrink:0;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.f-btn:hover{border-color:var(--blue);color:var(--blue)}
.f-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── 메인 콘텐츠 ── */
.main{max-width:800px;margin:0 auto;padding:1.25rem 1.5rem 4rem}
.chapter-block{margin-bottom:2.5rem}
.ch-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
.ch-label{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.ch-title-text{font-size:16px;font-weight:700;color:var(--text)}
.ch-cnt{margin-left:auto;font-size:12px;color:var(--text-muted)}

/* ── 카드 그리드 ── */
.prompt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
@media(max-width:600px){.prompt-grid{grid-template-columns:1fr}}
.prompt-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.prompt-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(26,26,255,.08)}
.p-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.p-num{font-size:11px;font-weight:700;min-width:32px;color:var(--text-muted)}
.p-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.p-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:8px;padding-left:42px}
.p-actions{padding-left:42px;display:flex;gap:6px}
.btn-view{font-size:11px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;color:var(--text-muted);transition:all .15s}
.btn-view:hover{border-color:var(--blue);color:var(--blue)}
.btn-copy{font-size:11px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--pink);background:transparent;cursor:pointer;font-family:inherit;color:var(--pink);transition:all .15s}
.btn-copy:hover{background:var(--pink);color:#fff}
.btn-copy.done{background:var(--pink);color:#fff}
.prompt-full{display:none;margin-top:10px;margin-left:42px;padding:.75rem 1rem;background:var(--bg);border-radius:8px;font-size:12.5px;color:var(--text);line-height:1.75;white-space:pre-wrap;word-break:break-all;border-left:3px solid var(--blue)}
.prompt-card.open .prompt-full{display:block}
.no-result{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:15px}

/* ── 푸터 ── */
.site-footer{text-align:center;padding:2rem 1rem;border-top:1px solid var(--border);color:var(--text-muted);font-size:12px;line-height:1.8}
.site-footer strong{color:var(--blue)}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-badge">부록 — 프롬프트 100선</div>
  <h1 class="header-title">AI가 사례기록 <span>쓰는 날</span></h1>
  <p class="header-sub">사회복지사를 위한 AI 업무 자동화 실전 레시피</p>
  <div class="header-meta">
    <span>황지원 (Jessica Hwang)</span>
    <span>총 100개 프롬프트</span>
    <span>10개 챕터</span>
  </div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" class="search-box" id="searchBox" placeholder="프롬프트 검색 (예: 사례기록, 공문, 인스타...)">
    <span class="count-badge" id="countBadge">100개</span>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-row" id="filterRow"></div>
</div>

<main class="main" id="mainWrap"></main>

<footer class="site-footer">
  <strong>《AI가 사례기록 쓰는 날》</strong> 부록 — 프롬프트 100선<br>
  저자: 황지원 (Jessica Hwang) · 오늘도 AI<br>
  이 프롬프트는 복지 실무에 자유롭게 활용하실 수 있습니다.
</footer>

<script>
const chapters=[
{id:"ch1",label:"Ch.1",title:"사례기록 & 상담일지",color:"#1a1aff",bg:"#eeeeff",tc:"#1a1aff",prompts:[
{num:"001",title:"사례기록 초안 생성",desc:"상담 내용 메모만 입력하면 구조화된 기록 초안 완성",full:`다음 상담 메모를 바탕으로 사례기록 초안을 작성해 주세요.\n\n[메모 내용 입력]\n\n형식: 날짜 / 방문(상담) 방법 / 주요 내용 / 개입 내용 / 다음 계획\n개인정보는 ○○○ 또는 이니셜로 처리해 주세요.`},
{num:"002",title:"SOAP 노트 작성",desc:"주관적·객관적·분석·계획 4단계 전문 기록 형식",full:`다음 내용을 SOAP 형식으로 정리해 주세요.\n\n[상담 내용 입력]\n\nS(Subjective): 클라이언트가 말한 내용\nO(Objective): 관찰된 사실\nA(Assessment): 복지사의 평가\nP(Plan): 계획\n\n전문 용어는 적절히 사용하되, 읽기 쉽게 작성해 주세요.`},
{num:"003",title:"상담일지 3줄 요약",desc:"긴 상담 내용을 3줄 핵심 요약으로",full:`다음 상담 내용을 3줄 핵심 요약으로 정리해 주세요.\n\n[상담 내용]\n\n형식:\n1. 주요 욕구/문제:\n2. 개입 내용:\n3. 다음 단계:`},
{num:"004",title:"가정방문 기록 초안",desc:"방문 메모 → 공식 방문기록서 형식으로 변환",full:`아래 방문 메모를 가정방문 기록서 형식으로 작성해 주세요.\n\n[메모]\n\n포함 항목: 방문일시, 방문목적, 가정환경 관찰, 대상자 상태, 주요 대화 내용, 제공 서비스, 향후 계획`},
{num:"005",title:"위기 상황 기록",desc:"위기 개입 후 신속한 기록 작성",full:`위기 개입 상황을 아래 메모 기반으로 공식 기록으로 작성해 주세요.\n\n[상황 메모]\n\n포함: 위기 인지 경위, 개입 시각, 개입 내용, 연계 기관, 현재 상태, 후속 모니터링 계획`},
{num:"006",title:"월간 사례 요약",desc:"한 달 지원 내역 → 월간 모니터링 보고서",full:`아래 월간 지원 내역을 월간 사례 요약 보고서로 작성해 주세요.\n\n[지원 내역 목록 입력]\n\n포함: 이용자 현황, 이달 주요 개입 내용, 욕구 변화, 다음 달 계획`},
{num:"007",title:"인테이크 보고서",desc:"초기 면접 내용 → 인테이크 보고서",full:`아래 초기 면접 메모를 인테이크 보고서로 작성해 주세요.\n\n[면접 메모]\n\n항목: 의뢰 경로, 주 호소 문제, 가족 구성, 경제 상황, 건강 상태, 사회적 지지 현황, 초기 욕구 분석, 제공 가능 서비스`},
{num:"008",title:"종결 기록 작성",desc:"서비스 종결 시 최종 기록 정리",full:`아래 내용을 바탕으로 사례 종결 기록을 작성해 주세요.\n\n[지원 기간 및 내용 요약]\n\n항목: 개입 기간, 주요 지원 내용, 목표 달성 여부, 종결 사유, 사후 관리 계획`},
{num:"009",title:"욕구 평가 요약",desc:"욕구 조사 결과 → 평가 보고서",full:`아래 욕구 조사 결과를 요약 평가 보고서로 정리해 주세요.\n\n[조사 내용]\n\n포함: 주요 욕구 영역, 우선순위 욕구, 자원 현황, 권고 서비스 방향`},
{num:"010",title:"다중 케이스 메모 정리",desc:"여러 케이스 메모를 한 번에 분류·정리",full:`아래 케이스 메모들을 각각 사례 번호별로 정리해 주세요.\n\n[메모 내용]\n\n각 케이스별 출력: 이용자(이니셜), 날짜, 주요 사항, 다음 액션`}
]},
{id:"ch2",label:"Ch.2",title:"보고서 & 공문",color:"#0d6e3e",bg:"#e8f5ee",tc:"#0d6e3e",prompts:[
{num:"011",title:"사업결과보고서 초안",desc:"사업 실적 데이터 → 완성형 결과보고서",full:`아래 사업 실적 데이터를 바탕으로 사업결과보고서 초안을 작성해 주세요.\n\n[사업명, 기간, 대상, 실적 수치]\n\n항목: 사업 개요, 추진 경과, 실적 현황(표), 성과 및 평가, 향후 과제`},
{num:"012",title:"월간 업무 보고서",desc:"이달 업무 내역 → 팀장/기관장 보고서",full:`이달 업무 내역을 월간 보고서로 정리해 주세요.\n\n[업무 내역 입력]\n\n형식: 주요 업무 실적 / 이슈 및 특이사항 / 다음 달 계획`},
{num:"013",title:"협조 공문 작성",desc:"업무 협조 요청 공문 초안",full:`아래 내용으로 기관 간 협조 공문을 작성해 주세요.\n\n[협조 요청 내용, 수신 기관]\n\n공문 형식: 제목, 수신, 발신, 목적, 협조 요청 사항, 기한, 담당자`},
{num:"014",title:"안내 공문 작성",desc:"프로그램·서비스 안내 공문",full:`아래 프로그램 정보를 기반으로 안내 공문을 작성해 주세요.\n\n[프로그램명, 일정, 대상, 내용]\n\n공문 형식: 사업 배경, 주요 내용, 참여 방법, 문의처`},
{num:"015",title:"보조금 정산 보고서",desc:"지출 내역 → 보조금 정산 보고서 초안",full:`아래 지출 내역을 바탕으로 보조금 정산 보고서 초안을 작성해 주세요.\n\n[지출 내역 목록]\n\n포함: 사업 개요, 예산 집행 현황(항목별), 잔액 처리, 특이사항`},
{num:"016",title:"후원금 감사 문구",desc:"후원자에게 보내는 영수증 + 감사 인사",full:`아래 후원 정보를 바탕으로 후원금 영수증과 감사 문구를 작성해 주세요.\n\n[후원자명, 금액, 날짜, 사업명]\n\n형식: 공식 영수증 문구 + 따뜻한 감사 인사`},
{num:"017",title:"회의록 작성",desc:"회의 메모 → 공식 회의록",full:`아래 회의 메모를 공식 회의록으로 정리해 주세요.\n\n[메모 내용]\n\n형식: 회의명, 일시, 참석자, 안건, 논의 내용, 결정 사항, 다음 회의 일정`},
{num:"018",title:"업무 인수인계서",desc:"담당 업무 인수인계 문서 초안",full:`아래 업무 내용을 인수인계서 형식으로 작성해 주세요.\n\n[업무 목록 및 현황]\n\n항목: 담당 업무 목록, 주요 케이스 현황, 진행 중 사업, 주의사항, 연락처`},
{num:"019",title:"기관 협약서 초안",desc:"기관 간 MOU·협약서 기본 초안",full:`아래 협약 내용을 기관 협약서 초안으로 작성해 주세요.\n\n[협약 기관명, 협약 목적, 주요 내용]\n\n포함: 목적, 협약 기간, 각 기관 역할, 협약 내용, 준수 사항`},
{num:"020",title:"지자체 제출 보고서",desc:"시·군·구청 제출용 보고서 형식 정리",full:`아래 내용을 지자체 제출 보고서 형식으로 정리해 주세요.\n\n[사업명, 기간, 대상, 실적]\n\n격식 있는 문어체로, 항목별 수치와 근거를 명확히 작성해 주세요.`}
]},
{id:"ch3",label:"Ch.3",title:"사업계획 & 기획",color:"#7a3f00",bg:"#fff3e0",tc:"#7a3f00",prompts:[
{num:"021",title:"연간 사업계획서 초안",desc:"사업 개요 입력 → 연간 계획서 자동 생성",full:`아래 정보를 바탕으로 연간 사업계획서 초안을 작성해 주세요.\n\n[사업명, 목적, 대상, 예산 규모]\n\n항목: 사업 목적 및 필요성, 추진 전략, 월별 추진 계획, 예산 계획, 기대 효과`},
{num:"022",title:"프로그램 기획서",desc:"아이디어 → 완성형 프로그램 기획서",full:`아래 아이디어를 프로그램 기획서로 작성해 주세요.\n\n[프로그램 아이디어, 대상, 기간]\n\n항목: 필요성, 목표, 대상자, 내용 구성(회기별), 장소·인력·예산, 기대 효과`},
{num:"023",title:"욕구 조사 설계",desc:"조사 목적 → 욕구 조사 설계서",full:`아래 조사 목적에 맞는 욕구 조사 설계서를 작성해 주세요.\n\n[대상, 주요 파악 항목]\n\n포함: 조사 목적, 방법(설문/면접), 문항 구성(예시 5개 이상), 일정, 분석 방향`},
{num:"024",title:"설문 문항 생성",desc:"조사 목적 → 설문지 문항 자동 생성",full:`아래 주제로 욕구 조사 설문지 문항을 만들어 주세요.\n\n[조사 주제, 대상]\n\n리커트 5점 척도 5문항 + 개방형 2문항 + 기본 인적사항 항목 포함`},
{num:"025",title:"보조금 사업 신청서",desc:"공모 요강 분석 → 신청서 초안",full:`아래 공모 요강을 분석해서 신청서 초안을 작성해 주세요.\n\n[공모 요강 내용 붙여넣기]\n\n우리 기관의 강점과 신청 사업을 연결해 채점자 시선에서 설득력 있게 작성`},
{num:"026",title:"SMART 성과 지표 설계",desc:"사업 목표 → SMART 지표로 변환",full:`아래 사업 목표를 SMART 성과 지표로 변환해 주세요.\n\n[사업 목표 입력]\n\nS(구체적) M(측정 가능) A(달성 가능) R(관련성) T(시한) 기준으로 3~5개 지표 제시`},
{num:"027",title:"회기별 프로그램 구성",desc:"총 회기 수 입력 → 회기별 내용 설계",full:`아래 프로그램을 총 [N]회기로 구성해 주세요.\n\n[프로그램명, 대상, 목표]\n\n각 회기: 주제 / 목표 / 활동 내용 / 준비물 / 유의사항`},
{num:"028",title:"예산 편성 초안",desc:"사업 내용 → 항목별 예산안",full:`아래 사업에 필요한 예산 편성 초안을 작성해 주세요.\n\n[사업명, 기간, 규모]\n\n항목: 인건비, 사업비(세부 항목별), 관리운영비, 각 산출 근거 포함`},
{num:"029",title:"사업 평가 계획",desc:"사업 목표 → 평가 계획 수립",full:`아래 사업의 평가 계획을 수립해 주세요.\n\n[사업명, 목표, 지표]\n\n포함: 평가 시기(중간/최종), 평가 방법, 측정 도구, 담당자, 피드백 반영 방안`},

{id:"ch6",label:"Ch.6",title:"AI 세팅 & GPTs",color:"#333",bg:"#f2f2f2",tc:"#333",prompts:[

{num:"053",title:"개인정보 마스킹 요청",desc:"기록 작성 전 개인정보 제거 프롬프트",full:`아래 내용에서 개인정보를 마스킹한 후 [작업 내용] 해 주세요.\n\n[원문]\n\n규칙: 이름→○○○, 주소→○○시 ○○구, 연락처→010-****-****, 생년월일→19**.**.**`},
{num:"054",title:"AI 활용 가능 여부 판단",desc:"AI를 쓰면 안 되는 상황 판단 요청",full:`지금 제가 하려는 작업에 AI를 활용해도 괜찮은지 판단해 주세요.\n\n[작업 내용]\n\n판단 기준: 개인정보 포함 여부, 법적 판단 포함 여부, 클라이언트 동의 여부`},
{num:"055",title:"AI 답변 오류 검토",desc:"AI 생성 초안의 오류·위험 검토",full:`아래 AI가 작성한 내용을 검토해 주세요.\n\n[AI 생성 내용]\n\n확인 항목: 사실 오류, 개인정보 노출, 비윤리적 표현, 복지 현장과 맞지 않는 내용`},
{num:"056",title:"프롬프트 개선 요청",desc:"쓰던 프롬프트를 더 효과적으로 개선",full:`아래 프롬프트를 더 효과적으로 개선해 주세요.\n\n[기존 프롬프트]\n\n개선 방향: 더 구체적인 출력 / 더 짧은 응답 / 더 공식적인 문체 (택1)`},
{num:"057",title:"복지 전문 용어 해설",desc:"생소한 복지 용어를 쉽게 설명받기",full:`아래 복지 관련 용어를 현장 실무자 관점에서 쉽게 설명해 주세요.\n\n[용어]\n\n포함: 정의(1문장), 현장 예시(1개), 관련 제도/법령(있으면)`},
{num:"058",title:"영문 복지 자료 번역 요약",desc:"영문 복지 자료 → 한글 요약 번역",full:`아래 영문 자료를 한국 복지 현장 실무자 관점에서 번역·요약해 주세요.\n\n[영문 자료]\n\n형식: 핵심 내용 요약(3~5줄) + 현장 적용 시사점 1~2개`},
{num:"059",title:"법령 조문 풀이",desc:"복지 관련 법령 조문 쉽게 풀이",full:`아래 법령 조문을 복지 현장 실무자가 이해하기 쉽게 설명해 주세요.\n\n[조문 내용]\n\n포함: 핵심 내용 요약, 실무 적용 예시, 주의사항\n주의: 법적 조언이 아닌 내용 이해를 위한 설명임을 명시`},
{num:"060",title:"AI 활용 동의 안내문",desc:"클라이언트에게 AI 활용 안내하는 문구",full:`클라이언트에게 AI 도구 활용 사실을 안내하는 문구를 작성해 주세요.\n\n어조: 친근하고 이해하기 쉽게\n포함: AI 활용 범위, 개인정보 보호 조치, 동의 여부 확인\n길이: 200자 이내`}

const filterRow=document.getElementById('filterRow');
const mainWrap=document.getElementById('mainWrap');
const searchBox=document.getElementById('searchBox');
const countBadge=document.getElementById('countBadge');
let activeFilter='all';
let searchQuery='';

// 필터 버튼 생성
const allBtn=document.createElement('button');
allBtn.className='f-btn active';allBtn.textContent='전체 100개';
allBtn.onclick=()=>setFilter('all',allBtn);
filterRow.appendChild(allBtn);
chapters.forEach(ch=>{
  const btn=document.createElement('button');
  btn.className='f-btn';btn.textContent=ch.label;
  btn.onclick=()=>setFilter(ch.id,btn);
  filterRow.appendChild(btn);
});

function setFilter(id,el){
  activeFilter=id;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

searchBox.addEventListener('input',()=>{searchQuery=searchBox.value.trim();render();});

function render(){
  mainWrap.innerHTML='';
  let total=0;
  const filtered=activeFilter==='all'?chapters:chapters.filter(c=>c.id===activeFilter);
  filtered.forEach(ch=>{
    const prompts=searchQuery
      ?ch.prompts.filter(p=>p.title.includes(searchQuery)||p.desc.includes(searchQuery)||p.full.includes(searchQuery))
      :ch.prompts;
    if(!prompts.length)return;
    total+=prompts.length;
    const block=document.createElement('div');block.className='chapter-block';
    const hdr=document.createElement('div');hdr.className='ch-header';
    hdr.innerHTML=`<span class="ch-label" style="background:${ch.bg};color:${ch.tc}">${ch.label} ${ch.title}</span><span class="ch-cnt">${prompts.length}개</span>`;
    block.appendChild(hdr);
    const grid=document.createElement('div');grid.className='prompt-grid';
    prompts.forEach(p=>{
      const card=document.createElement('div');card.className='prompt-card';
      card.innerHTML=`<div class="p-top"><span class="p-num" style="color:${ch.tc}">#${p.num}</span><span class="p-title">${p.title}</span></div><div class="p-desc">${p.desc}</div><div class="p-actions"><button class="btn-view">펼쳐보기 ↓</button><button class="btn-copy">복사하기</button></div><pre class="prompt-full">${p.full.replace(/</g,'&lt;')}</pre>`;
      const viewBtn=card.querySelector('.btn-view');
      const copyBtn=card.querySelector('.btn-copy');
      viewBtn.onclick=()=>{
        const isOpen=card.classList.toggle('open');
        viewBtn.textContent=isOpen?'접기 ↑':'펼쳐보기 ↓';
      };
      copyBtn.onclick=()=>{
        navigator.clipboard&&navigator.clipboard.writeText(p.full).then(()=>{
          copyBtn.textContent='복사됨 ✓';copyBtn.classList.add('done');
          setTimeout(()=>{copyBtn.textContent='복사하기';copyBtn.classList.remove('done');},1800);
        });
      };
      grid.appendChild(card);
    });
    block.appendChild(grid);
    mainWrap.appendChild(block);
  });
  if(!total){
    mainWrap.innerHTML='<div class="no-result">검색 결과가 없습니다.</div>';
  }
  countBadge.textContent=total+'개';
}
render();
</script>
